server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FRED API proxy
    location /api/fred/ {
        proxy_pass https://api.stlouisfed.org/fred/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.stlouisfed.org;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # BLS API proxy
    location /api/bls/ {
        proxy_pass https://api.bls.gov/publicAPI/v2/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.bls.gov;
        proxy_set_header Content-Type application/json;
    }

    # CoinGecko API proxy
    location /api/coingecko/ {
        proxy_pass https://api.coingecko.com/api/v3/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.coingecko.com;
    }

    # Alpha Vantage API proxy
    location /api/alphavantage/ {
        proxy_pass https://www.alphavantage.co/query?;
        proxy_ssl_server_name on;
        proxy_set_header Host www.alphavantage.co;
    }

    # Eastmoney API proxy
    location /api/eastmoney/ {
        proxy_pass https://push2.eastmoney.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host push2.eastmoney.com;
        proxy_set_header Referer https://eastmoney.com/;
        proxy_set_header User-Agent "Mozilla/5.0";
    }

    # Eastmoney Kline API proxy
    location /api/eastmoneykline/ {
        proxy_pass http://push2his.eastmoney.com/;
        proxy_set_header Referer https://eastmoney.com/;
        proxy_set_header User-Agent "Mozilla/5.0";
    }

    # Tencent Finance API proxy (A股数据)
    location /api/tencent/ {
        proxy_pass http://qt.gtimg.cn/;
    }

    # Frankfurter API proxy (汇率)
    location /api/frankfurter/ {
        proxy_pass https://api.frankfurter.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.frankfurter.app;
    }

    # Polymarket Gamma API proxy
    location /api/polymarket/ {
        proxy_pass https://gamma-api.polymarket.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host gamma-api.polymarket.com;
    }

    # Python backend proxy
    location /api/backend/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static data files
    location /data/ {
        alias /usr/share/nginx/html/data/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}