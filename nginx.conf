server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Python backend proxy (all API requests go through backend)
    location /api/backend/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tencent Finance API proxy (中国A股指数)
    location /api/tencent/ {
        proxy_pass https://qt.gtimg.cn/;
        proxy_set_header Host qt.gtimg.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Polymarket Gamma API proxy
    location /api/polymarket/ {
        proxy_pass https://gamma-api.polymarket.com/;
        proxy_set_header Host gamma-api.polymarket.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Frankfurter API proxy (ECB exchange rates)
    location /api/frankfurter/ {
        proxy_pass https://api.frankfurter.dev/;
        proxy_set_header Host api.frankfurter.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Static data files
    location /data/ {
        alias /usr/share/nginx/html/data/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}